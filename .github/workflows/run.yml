name: Feed Aggregator

on:
  workflow_dispatch:  # Manual trigger from the Actions tab.
  # Once you're happy with results, uncomment to run weekly (Mon 7am UTC):
  # schedule:
  #   - cron: "0 7 * * 1"

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # add this line
    permissions:
      contents: write   # required so the job can commit seen.json back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run aggregator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: python aggregate.py

      - name: Commit state
        run: |
          git config user.name "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git add seen.json latest_digest.md 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update feed state $(date -u +%Y-%m-%d)"
          git push
